<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Zephyr in the Browser</title>
    <meta
      name="description"
      content="The Zephyr RTOS shell running in the browser on qemu-wasm."
    />
  </head>
  <body>
    <div id="root"></div>
    <!--
      Static hosts like GitHub Pages cannot send Cross-Origin-Opener-Policy or
      Cross-Origin-Embedder-Policy, and without them SharedArrayBuffer is
      unavailable and the qemu backend refuses to start. This service worker
      re-serves the page to itself with those headers attached, reloading once
      on first visit. Harmless where the headers already arrive from the server
      (the dev server, or a host with a _headers file) — it detects isolation
      and does nothing.
    -->
    <script src="./coi-serviceworker.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
