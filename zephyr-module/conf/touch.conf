# Turn the display panel into a touch surface.
#
# Everything else is already in place upstream: the Cortex-A53 board devicetree
# declares `virtio_input0` on virtio-mmio slot 3 and points `zephyr,touch` at
# it, and CONFIG_INPUT_VIRTIO defaults on from that node. But the whole input
# subsystem is opt-in, so without this one symbol the driver is never compiled
# and the chosen goes nowhere.
#
# LVGL then builds a pointer indev from `zephyr,touch` on its own
# (LV_Z_POINTER_FROM_CHOSEN_TOUCH, default y), so a demo becomes clickable
# without a line of application code.
#
# The browser end is src/hostInput.ts, feeding the virtio-tablet-device that
# src/boards.ts puts on slot 3.
CONFIG_INPUT=y
