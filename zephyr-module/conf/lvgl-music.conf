# Select the LVGL music-player demo, and let it drive itself: with auto play
# the player animates forever without any input device, which is exactly right
# for an output-only ramfb panel.
CONFIG_LV_Z_DEMO_MUSIC=y
CONFIG_LV_DEMO_MUSIC_AUTO_PLAY=y

# The demo is entirely CPU-bound under the wasm JIT — every guest instruction is
# translated, and the "now playing" screen (rotated cover + gradient spectrum
# bars) is LVGL software-rendering ~500 KB/frame at 32bpp. Building the guest with
# -O2 instead of Zephyr's default -Os thins out LVGL's blend/gradient/scale inner
# loops, which is a direct frame-rate win. Measured on qemu_cortex_a53 with the
# LVGL demo's own average-FPS benchmark: 2 -> 4 FPS overall, and the album-art
# scene's per-frame render time 380 ms -> 126 ms (~3x). ELF grows ~150 KB.
CONFIG_SPEED_OPTIMIZATIONS=y
