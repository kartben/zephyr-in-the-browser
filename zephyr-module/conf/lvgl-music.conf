# Select the LVGL music-player demo, and let the *pointer* drive it:
# conf/touch.conf gives the board a virtio-input tablet, so the transport
# controls and the track list respond to clicks on the display panel.
#
# AUTO_PLAY is deliberately off, and it is worth saying why, because this file
# used to enable it on the grounds that "the player animates forever without
# any input device". It does not. Auto play is a fixed 41-step script
# (lv_demo_music.c, auto_step_cb): step 40 covers the whole UI with an opaque
# "The average FPS is" overlay and step 41 loads an empty screen. So it ran for
# about 35 s and then left the panel dead — with the FPS number blank, since
# that label is only filled in when LV_USE_PERF_MONITOR is on. Now that clicks
# reach the guest, a demo that waits for one beats a demo that ends.
CONFIG_LV_Z_DEMO_MUSIC=y
CONFIG_LV_DEMO_MUSIC_AUTO_PLAY=n

# -O2 (CONFIG_SPEED_OPTIMIZATIONS) used to be set here; it now applies to every
# packaged image from the browser_bridge shield's Kconfig.defconfig, which
# explains why it matters far more than "-Os vs -O2" suggests. Kept as a note
# because the measurement was taken on this demo: 2 -> 4 FPS overall, album-art
# scene 380 ms -> 126 ms per frame.
#
# That was originally credited to LVGL's blend/gradient/scale inner loops. Only
# part of it was: -Os also selects a byte-at-a-time picolibc memcpy on AArch64,
# and this demo copies ~500 KB per frame into the framebuffer. See the shield's
# Kconfig.defconfig for the isolated 35x measurement.
