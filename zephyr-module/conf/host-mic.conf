# DMIC subsystem plus the `dmic` shell commands (`read`, `vu`, `dump`), so the
# host-fed microphone is reachable from the Zephyr shell without writing an
# application: `dmic vu dmic0` shows a live level meter the browser feeds from
# getUserMedia capture. The commands loop on dmic_read(), which paces on
# k_sleep, so this pairs with the Cortex-A53 shell only — the TCI-interpreted
# Cortex-M3 stalls on k_sleep (see tools/samples.manifest).
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y
CONFIG_AUDIO_DMIC_SHELL=y
