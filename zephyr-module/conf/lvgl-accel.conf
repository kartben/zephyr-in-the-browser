# The accelerometer_chart sample ships CONFIG_MAIN_STACK_SIZE=4096, a value
# tuned for the 32-bit native_sim host it targets upstream. On the 64-bit
# qemu_cortex_a53 that 4 KB is too tight: the main thread runs lv_timer_handler,
# and when the timer callback logs (its error path calls LOG_ERR, whose deferred
# cbprintf packaging is stack-hungry on aarch64) the frame chain overruns the
# stack. Zephyr's sentinel names it "Stack overflow"; without CONFIG_STACK_SENTINEL
# the overrun silently corrupts memory and surfaces as a wild instruction abort
# at PC=0 with a scrambled register file. 8 KB clears the worst case (a LOG_ERR
# on every tick) with headroom. See docs/a53-lvgl-stack.md.
CONFIG_MAIN_STACK_SIZE=8192
