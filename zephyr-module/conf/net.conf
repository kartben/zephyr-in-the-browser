# Shared by every packaged networking sample. The browser page implements the
# entire remote network (DHCP/DNS/SNTP servers, TCP/UDP peers, an HTTP proxy
# riding fetch()) behind the QEMU "browser" netdev; the guest just speaks
# Ethernet/IPv4. See src/net/ in the repo.
#
# NET_QEMU_ETHERNET flips Zephyr's qemu-networking choice away from its SLIP
# default. That matters twice over: SLIP would claim the UART the
# browser_bridge shield already uses for GNSS, and the option implies
# NET_L2_ETHERNET, which the DT-enabled NIC drivers key off (stellaris on the
# Cortex-M3, virtio-net on the Cortex-A53).
CONFIG_NET_QEMU_ETHERNET=y

# v1 of the browser network is IPv4-only: dropping IPv6 halves the boot noise
# and trims RAM on the 64 KiB Cortex-M3. NEED_IPV6 must fall with it because
# it *selects* NET_IPV6 (echo_server and zperf set both in their prj.conf).
CONFIG_NET_IPV6=n
CONFIG_NET_CONFIG_NEED_IPV6=n
