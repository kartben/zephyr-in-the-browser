name: qemu-host-sensor
build:
  cmake: .
  kconfig: Kconfig
  settings:
    # Makes dts/bindings/ below visible to the devicetree compiler.
    dts_root: .
    # Makes boards/shields/ below discoverable, i.e. the browser_bridge shield.
    board_root: .
    # Makes snippets/ below discoverable, i.e. `-S virtio-gpu`.
    snippet_root: .
