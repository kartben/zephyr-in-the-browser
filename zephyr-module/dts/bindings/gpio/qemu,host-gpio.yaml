description: |
  Host-backed GPIO exposed by QEMU over MMIO.

  Input pins are driven by the QEMU host and output pins are observed by it,
  rather than being wired to emulated hardware. Under qemu-wasm that host is a
  browser, so a page can raise buttons on the inputs and light indicators from
  the outputs the guest drives.

compatible: "qemu,host-gpio"

include: [gpio-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  # ngpios is inherited from gpio-controller.yaml (default 32); the device
  # overlay sets it to the real pin count. Not re-declared here because marking
  # an inherited-with-default property "required" is a binding warning.

gpio-cells:
  - pin
  - flags
